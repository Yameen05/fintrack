# Production overrides — activate with: -Dspring.profiles.active=prod
# or SPRING_PROFILES_ACTIVE=prod env var

# Never mutate the schema automatically in production
spring.jpa.hibernate.ddl-auto=validate

# Reduce SQL verbosity
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN

# Only expose the health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
