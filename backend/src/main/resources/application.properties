# Server
server.port=8080

# Database - Docker configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:db}:3306/fintrack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# OpenAI
openai.api.key=${OPENAI_API_KEY:your-openai-api-key}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o-mini

# Plaid (sign up at dashboard.plaid.com for free sandbox keys)
plaid.client-id=${PLAID_CLIENT_ID:}
plaid.secret=${PLAID_SECRET:}
plaid.env=${PLAID_ENV:sandbox}
plaid.webhook-url=${PLAID_WEBHOOK_URL:}
# Base64-encoded 256-bit AES key for encrypting Plaid access tokens.
# Generate with: openssl rand -base64 32
plaid.encryption-key=${PLAID_ENCRYPTION_KEY:}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Logging
logging.level.com.fintrack=INFO

# Health check endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
