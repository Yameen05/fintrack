# Local Development Configuration
# Use this profile for local development: mvn spring-boot:run -Dspring-boot.run.profiles=local

# JWT - local dev only (do NOT use this value in production)
jwt.secret=local-dev-secret-not-for-production-use-at-least-32-chars

# Database - Local MySQL configuration
spring.datasource.url=jdbc:mysql://localhost:3306/fintrack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# Enable SQL logging for development
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# CORS for local development
cors.allowed.origins=http://localhost:5173,http://localhost:3000

# Relaxed security for development
logging.level.com.fintrack=DEBUG

# Plaid - local dev encryption key (do NOT use in production; generate a fresh one for prod)
plaid.encryption-key=ZGV2LW9ubHkta2V5LW5vdC1mb3ItcHJvZHVjdGlvbi11c2U=