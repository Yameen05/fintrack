# Local Development Configuration
# Use this profile for local development: mvn spring-boot:run -Dspring-boot.run.profiles=local

# Database - Local MySQL configuration
spring.datasource.url=jdbc:mysql://localhost:3306/fintrack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# Enable SQL logging for development
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# CORS for local development
cors.allowed.origins=http://localhost:5173,http://localhost:3000

# Relaxed security for development
logging.level.com.fintrack=DEBUG